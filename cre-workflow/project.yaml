staging-settings:
  rpcs:
    - chain-name: base-testnet-sepolia
      url: https://base-sepolia-rpc.publicnode.com
  user-workflow:
    workflow-name: "tenancy-cre-staging"
    workflow-artifacts:
      workflow-path: "main.ts"
      config-path: "config.staging.json"

production-settings:
  rpcs:
    - chain-name: base-testnet-sepolia
      url: https://base-sepolia.g.alchemy.com/v2/${BASE_SEPOLIA_ALCHEMY_KEY}
  user-workflow:
    workflow-name: "tenancy-cre-production"
    workflow-artifacts:
      workflow-path: "main.ts"
      config-path: "config.production.json"
