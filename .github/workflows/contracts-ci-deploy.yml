name: Smart Contracts CI & Deploy

on:
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts-ci-deploy.yml'
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts-ci-deploy.yml'
    tags:
      - 'contracts-v*'
  workflow_dispatch:
    inputs:
      network:
        description: 'Deployment network'
        required: true
        default: 'sepolia'
        type: choice
        options:
          - sepolia
          - base_sepolia

jobs:
  forge-test:
    name: Forge Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: forge install --no-commit

      - name: Run tests
        run: forge test -vvv

  slither:
    name: Slither Analysis
    runs-on: ubuntu-latest
    needs: forge-test
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        run: slither src --filter-paths "lib|script|test" --exclude naming-convention

  deploy:
    name: Deploy Contracts
    runs-on: ubuntu-latest
    needs: [forge-test, slither]
    if: startsWith(github.ref, 'refs/tags/contracts-v') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: contracts
    env:
      SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: forge install --no-commit

      - name: Verify secrets are configured
        run: |
          if [ -z "$PRIVATE_KEY" ]; then
            echo "DEPLOYER_PRIVATE_KEY secret is required" >&2
            exit 1
          fi

      - name: Deploy to Sepolia
        if: github.event.inputs.network == 'sepolia' || (startsWith(github.ref, 'refs/tags/contracts-v') && github.event_name != 'workflow_dispatch')
        run: |
          if [ -z "$SEPOLIA_RPC_URL" ]; then
            echo "SEPOLIA_RPC_URL secret is required" >&2
            exit 1
          fi
          forge script script/DeployTENANCY.s.sol:DeployTENANCY \
            --rpc-url "$SEPOLIA_RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --broadcast

      - name: Deploy to Base Sepolia
        if: github.event.inputs.network == 'base_sepolia'
        run: |
          if [ -z "$BASE_SEPOLIA_RPC_URL" ]; then
            echo "BASE_SEPOLIA_RPC_URL secret is required" >&2
            exit 1
          fi
          forge script script/DeployTENANCY.s.sol:DeployTENANCY \
            --rpc-url "$BASE_SEPOLIA_RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --broadcast
